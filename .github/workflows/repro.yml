name: SwiftShader repro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    outputs:
      apk-artifact: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install NDK 28.2.13676358
        run: sdkmanager "ndk;28.2.13676358"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  run:
    name: Run on emulator (-gpu ${{ matrix.gpu }})
    needs: build
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        gpu: [swiftshader, swangle]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install NDK 28.2.13676358
        run: sdkmanager "ndk;28.2.13676358"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api35-x86_64

      - name: Create AVD (cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot-save -no-audio -no-boot-anim -gpu ${{ matrix.gpu }}
          disable-animations: true
          script: echo "AVD created"

      - name: Run repro app (captures logcat)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -no-audio -no-boot-anim -gpu ${{ matrix.gpu }}
          disable-animations: true
          script: bash ci/run-repro.sh

      # Hard pass/fail signal:
      #   - swangle:    test passes → job + workflow stay green.
      #   - swiftshader: test fails → job + workflow go RED. That is the
      #                  bug demonstration; a green swiftshader run would
      #                  mean the upstream fix landed (or this repro broke).
      #
      # Test reports and PNG artifacts still upload — see `if: always()`
      # on the later steps. Do NOT add `continue-on-error: true` here:
      # it hides the failure at the job/workflow level.
      #
      # The previous step installed the APK from the build job (different
      # debug keystore than the local Gradle build). Uninstall before the
      # test step so Gradle can install its own freshly-built APK.
      - name: Run instrumented test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -no-audio -no-boot-anim -gpu ${{ matrix.gpu }}
          disable-animations: true
          script: |
            adb uninstall com.example.swsrepro || true
            adb uninstall com.example.swsrepro.test || true
            ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Collect test reports
        if: always()
        run: |
          mkdir -p artifacts/androidTest-reports
          cp -r app/build/reports/androidTests/connected/. artifacts/androidTest-reports/ 2>/dev/null || true
          cp -r app/build/outputs/androidTest-results/connected/. artifacts/androidTest-reports/ 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-${{ matrix.gpu }}
          path: artifacts/
          if-no-files-found: warn
