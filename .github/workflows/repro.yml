name: SwiftShader repro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    outputs:
      apk-artifact: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install NDK 28.2.13676358
        run: sdkmanager "ndk;28.2.13676358"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  run:
    name: Run on emulator (-gpu ${{ matrix.gpu }})
    needs: build
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        gpu: [swiftshader, swangle]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api35-x86_64

      - name: Create AVD (cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot-save -no-audio -no-boot-anim -gpu ${{ matrix.gpu }}
          disable-animations: true
          script: echo "AVD created"

      - name: Run repro app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -no-audio -no-boot-anim -gpu ${{ matrix.gpu }}
          disable-animations: true
          script: |
            set -euxo pipefail

            # Capture environment for the bug report.
            adb shell getprop ro.product.cpu.abi
            adb shell getprop ro.opengles.version
            adb shell glesinfo 2>/dev/null || true
            $ANDROID_HOME/emulator/emulator -version | head -3

            # Install + launch.
            adb install -r app/build/outputs/apk/debug/app-debug.apk

            adb logcat -c
            adb shell am start -W -n com.example.swsrepro/.MainActivity

            # Wait for the app to finish (it calls finish() after writing both PNGs).
            for i in $(seq 1 30); do
              if ! adb shell pidof com.example.swsrepro >/dev/null 2>&1; then
                echo "app exited after ${i}s"
                break
              fi
              sleep 1
            done

            # Dump app logs.
            adb logcat -d 2>/dev/null | grep -E "swsrepro" | grep -v "AppsFilter\|SatelliteApp\|ImsResolver\|WindowManager\|CarrierSvc\|SdkSandbox\|SafetyLabel\|NativePermission\|AS\.Audio\|ShortcutService\|AppWinLayout\|VvmPkg\|CoreBack\|LauncherApps\|ActivityManager\|ProximityAuth\|Finsky" > swsrepro-logcat.txt || true
            cat swsrepro-logcat.txt

            # Pull artifacts to host.
            mkdir -p artifacts
            adb pull /storage/emulated/0/Android/data/com.example.swsrepro/files artifacts/pngs 2>&1 || echo "no PNGs on device"
            cp swsrepro-logcat.txt artifacts/

            ls -la artifacts/pngs/ || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-${{ matrix.gpu }}
          path: artifacts/
          if-no-files-found: warn
